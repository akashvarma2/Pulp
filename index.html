<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp Pro - Version 1.4-BETA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --pulp-lime: #a6e22e; --pulp-amber: #ff8c00; --pulp-red: #ff4d4d;
            --bg-black: #000000; --drawer-bg: rgba(18, 18, 18, 0.98);
            --glass-card: rgba(22, 22, 24, 0.98); --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.7); --border-glass: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.03); --shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        body { 
            background-color: var(--bg-black); font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; align-items: flex-start; justify-content: center; 
            min-height: 100vh; margin: 0; color: var(--text-main); overflow-x: hidden; padding: 20px;
        }

        .nav-view { max-width: 900px; width: 100%; text-align: center; margin-top: 80px; }
        .hidden { display: none !important; }
        .hub-title { font-weight: 900; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; color: var(--pulp-lime); }

        .selection-grid { display: flex; flex-direction: column; gap: 30px; align-items: center; width: 100%; }
        @media (min-width: 768px) { .selection-grid { flex-direction: row; justify-content: center; flex-wrap: wrap; } }

        .selection-card {
            background: var(--glass-card); border: 2px solid var(--border-glass); border-radius: 45px; 
            cursor: pointer; transition: 0.3s ease; display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-end; width: 260px; height: 320px; 
            overflow: hidden; position: relative; box-shadow: var(--shadow);
        }
        .selection-card:hover { border-color: var(--pulp-lime); transform: translateY(-5px); }
        .selection-card i.main-icon { position: absolute; top: 40%; transform: translateY(-50%); font-size: 5rem; color: var(--pulp-lime); opacity: 0.8; }
        
        .commodity-name-section {
            width: 100%; height: 20%; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; background: var(--glass-card); z-index: 2; padding-bottom: 15px;
        }
        .commodity-name-section span { font-weight: 900; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; }

        /* Camera & Results Styles */
        #camera-container { width: 100%; max-width: 450px; margin: 0 auto; border-radius: 35px; overflow: hidden; border: 2px solid var(--pulp-lime); position: relative; }
        video { width: 100%; height: auto; }
        .ai-result-card { background: var(--glass-card); border: 1px solid var(--border-glass); border-radius: 40px; padding: 25px; text-align: left; margin-top: 20px; }
        .result-label { font-size: 0.65rem; color: var(--pulp-lime); font-weight: 900; letter-spacing: 2px; margin-bottom: 5px; }
        .result-text { font-size: 1rem; color: var(--text-main); margin-bottom: 20px; font-weight: 400; }
        .result-title { font-size: 1.6rem; color: var(--pulp-red); font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }

        .btn-main { background: linear-gradient(135deg, var(--pulp-amber), #ff4500); color: #fff; border-radius: 100px; padding: 18px; font-weight: 900; width: 100%; border: none; text-transform: uppercase; margin-top: 20px; }
        .btn-secondary { background: transparent; border: 1px solid var(--border-glass); color: var(--text-dim); border-radius: 100px; padding: 12px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- Main Grid -->
    <div id="main-hub" class="nav-view">
        <div class="hub-title">Select Commodity</div>
        <div class="selection-grid">
            <div class="selection-card" onclick="alert('Banana Logic')">
                <i class="bi bi- recursive main-icon"></i>
                <div class="commodity-name-section"><span>Banana</span></div>
            </div>
            <div class="selection-card" onclick="alert('Mango Logic')">
                <i class="bi bi-sun main-icon"></i>
                <div class="commodity-name-section"><span>Mango</span></div>
            </div>
            <div class="selection-card" onclick="alert('Avocado Logic')">
                <i class="bi bi-shield-check main-icon"></i>
                <div class="commodity-name-section"><span>Avocado</span></div>
            </div>
            <!-- THE FOURTH OPTION -->
            <div class="selection-card" onclick="openDefectPicker()" style="border-color: var(--pulp-amber);">
                <i class="bi bi-camera main-icon" style="color: var(--pulp-amber);"></i>
                <div class="commodity-name-section"><span>Detect Defects</span></div>
            </div>
        </div>
    </div>

    <!-- Defect Commodity Picker -->
    <div id="defect-picker" class="nav-view hidden">
        <div class="hub-title">Target Fruit</div>
        <div class="selection-grid">
            <div class="selection-card" style="height: 180px;" onclick="initCamera('Banana')">
                <div class="commodity-name-section" style="height: 100%;"><span>Banana</span></div>
            </div>
            <div class="selection-card" style="height: 180px;" onclick="initCamera('Mango')">
                <div class="commodity-name-section" style="height: 100%;"><span>Mango</span></div>
            </div>
            <div class="selection-card" style="height: 180px;" onclick="initCamera('Avocado')">
                <div class="commodity-name-section" style="height: 100%;"><span>Avocado</span></div>
            </div>
        </div>
        <button class="btn-secondary" onclick="showView('main-hub')">Cancel</button>
    </div>

    <!-- Camera View -->
    <div id="camera-view" class="nav-view hidden">
        <div class="hub-title" id="cam-header">Scan</div>
        <div id="camera-container">
            <video id="webcam" autoplay playsinline></video>
        </div>
        <button class="btn-main" onclick="analyzeDefect()">Capture & Identify</button>
        <button class="btn-secondary" onclick="openDefectPicker()">Back</button>
    </div>

    <!-- Results View -->
    <div id="results-view" class="nav-view hidden">
        <div class="hub-title">Analysis Complete</div>
        <div class="ai-result-card">
            <div class="result-label">DETECTED ISSUE</div>
            <div class="result-title" id="res-name">Processing...</div>
            
            <div class="result-label">PROBABLE CAUSE</div>
            <div class="result-text" id="res-cause">...</div>

            <div class="result-label">AI RECOMMENDATION</div>
            <div class="result-text" id="res-advice">...</div>
        </div>
        <button class="btn-main" onclick="showView('main-hub')">Done</button>
    </div>

    <script>
        let stream = null;
        let selectedFruit = "";

        function showView(id) {
            document.querySelectorAll('.nav-view').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id !== 'camera-view' && stream) stopCamera();
        }

        function openDefectPicker() { showView('defect-picker'); }

        async function initCamera(fruit) {
            selectedFruit = fruit;
            document.getElementById('cam-header').innerText = `Scan ${fruit}`;
            showView('camera-view');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                document.getElementById('webcam').srcObject = stream;
            } catch (err) {
                alert("Camera access is required for this feature.");
                showView('defect-picker');
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
        }

        function analyzeDefect() {
            showView('results-view');
            // Simulating AI Response for the demo
            setTimeout(() => {
                document.getElementById('res-name').innerText = "Anthracnose";
                document.getElementById('res-cause').innerText = "Fungal infection (Colletotrichum musae) often appearing as small, circular, dark spots that expand as the fruit ripens.";
                document.getElementById('res-advice').innerText = "Ensure careful handling to avoid skin injuries. Improve post-harvest temperature management and maintain proper sanitation in packing areas.";
            }, 800);
        }
    </script>
</body>
</html>
