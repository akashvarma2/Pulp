<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp Pro</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="edited-image.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --pulp-lime: #a6e22e; 
            --pulp-amber: #ff8c00;
            --pulp-red: #ff4d4d;
            --bg-black: #000000;
            --drawer-bg: rgba(18, 18, 18, 0.98);
            --glass-card: rgba(22, 22, 24, 0.98);
        }

        body { 
            background-color: var(--bg-black);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; align-items: flex-start; justify-content: center; 
            min-height: 100vh; margin: 0; color: #fff; overflow-x: hidden;
            padding: 20px;
        }

        /* SPLASH SCREEN */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-black); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease-in-out, visibility 1s;
        }
        .splash-logo { width: auto; height: auto; max-width: 80%; max-height: 40vh; object-fit: contain; animation: heroFade 2.6s ease-in-out forwards; }
        .splash-text { margin-top: 20px; font-size: 2rem; font-weight: 900; letter-spacing: 6px; color: var(--pulp-lime); text-transform: uppercase; text-shadow: 0 0 15px rgba(166, 226, 46, 0.5); opacity: 0; animation: textFade 2.6s ease-in-out forwards; }

        @keyframes heroFade {
            0% { transform: scale(0.8); opacity: 0; filter: blur(15px); }
            35% { transform: scale(1); opacity: 1; filter: blur(0px); }
            75% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.05); opacity: 0; filter: blur(10px); }
        }
        @keyframes textFade {
            0% { transform: translateY(10px); opacity: 0; }
            35% { transform: translateY(0); opacity: 1; }
            75% { opacity: 1; }
            100% { opacity: 0; }
        }
        .loaded #splash-screen { opacity: 0; visibility: hidden; }

        /* MENU TRIGGER */
        #menu-trigger {
            position: fixed; top: 20px; left: 20px; width: 44px; height: 44px;
            background: rgba(255,255,255,0.03); border-radius: 12px; z-index: 9900;
            display: flex; align-items: center; justify-content: center; opacity: 0;
            transition: all 0.5s ease 2.6s;
        }
        .loaded #menu-trigger { opacity: 1; }
        #menu-trigger span, #menu-trigger span::before, #menu-trigger span::after { content: ''; display: block; width: 20px; height: 2px; background: #fff; position: absolute; }
        #menu-trigger span::before { top: -6px; }
        #menu-trigger span::after { bottom: -6px; }

        /* SIDE MENU */
        #menu-drawer {
            position: fixed; top: 0; left: -100%; width: 280px; height: 100%;
            background: var(--drawer-bg); z-index: 9995;
            box-shadow: 20px 0 60px rgba(0,0,0,0.8);
            transition: left 0.4s cubic-bezier(0.15, 1, 0.3, 1);
            padding: 30px; display: flex; flex-direction: column;
            backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.05);
        }
        #menu-drawer.open { left: 0; }
        #menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9994; display: none; }
        #menu-overlay.open { display: block; }
        .menu-item { padding: 15px; color: rgba(255,255,255,0.7); cursor: pointer; text-transform: uppercase; font-weight: 800; font-size: 0.8rem; letter-spacing: 1px; }

        /* VIEWS */
        .nav-view { max-width: 900px; width: 100%; text-align: center; opacity: 0; transition: 0.5s; margin-top: 80px; }
        .loaded .nav-view { opacity: 1; }
        .hub-title { font-weight: 900; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; color: var(--pulp-lime); }
        
        /* COMMODITY CARDS - VERTICAL ON MOBILE */
        .selection-grid-container { width: 100%; overflow: visible; padding-bottom: 40px; }
        .selection-grid { 
            display: flex; 
            flex-direction: column; 
            gap: 30px; 
            align-items: center;
            width: 100%;
        }
        
        /* GRID ON DESKTOP */
        @media (min-width: 768px) {
            .selection-grid { 
                flex-direction: row; 
                justify-content: center; 
                flex-wrap: wrap;
            }
        }

        .selection-card {
            background: var(--glass-card); border: 2px solid rgba(255,255,255,0.1); border-radius: 45px; 
            cursor: pointer; transition: 0.3s ease; display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-end; width: 260px; height: 320px; 
            overflow: hidden; position: relative; flex-shrink: 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .selection-card:hover { border-color: var(--pulp-lime); transform: translateY(-5px); }
        .selection-card img { position: absolute; top: 0; left: 0; width: 100%; height: 80%; object-fit: cover; border-radius: 43px 43px 0 0; }
        .commodity-name-section {
            width: 100%; height: 20%; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; background: linear-gradient(to top, var(--glass-card) 70%, transparent); 
            z-index: 2; padding-bottom: 15px;
        }
        .commodity-name-section span { display: block; font-weight: 900; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; color: #fff; }

        /* LIST BUTTONS */
        .list-container { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto; }
        .list-btn {
            background: var(--glass-card); border: 1px solid rgba(255,255,255,0.1); padding: 22px; border-radius: 20px; 
            cursor: pointer; transition: 0.3s; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; 
            font-size: 0.9rem; color: #fff; text-align: center;
        }
        .list-btn:hover:not(.disabled) { border-color: var(--pulp-lime); background: rgba(166, 226, 46, 0.05); color: var(--pulp-lime); }
        .list-btn.disabled { opacity: 0.4; cursor: default; }

        /* FAVORITES SECTION */
        #favorites-section { margin-top: 50px; padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); }
        .fav-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-top: 20px; }
        .fav-card {
            background: rgba(166, 226, 46, 0.05); border: 1px solid rgba(166, 226, 46, 0.2);
            padding: 15px 25px; border-radius: 20px; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; min-width: 140px;
        }
        .fav-card:hover { border-color: var(--pulp-lime); background: rgba(166, 226, 46, 0.15); }
        .fav-card i { color: var(--pulp-lime); font-size: 1.2rem; margin-bottom: 5px; }
        .fav-card span { font-weight: 900; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }

        /* CALCULATOR & DESKTOP ADAPTATION */
        .app-container { display: none; flex-direction: column; gap: 30px; width: 100%; max-width: 400px; margin-top: 40px; }
        
        @media (min-width: 992px) {
            .app-container { flex-direction: row; max-width: 1100px; align-items: flex-start; justify-content: center; }
            .app-card { flex: 0 0 380px; position: sticky; top: 40px; }
            .history-section { flex: 1; margin-top: 0 !important; background: var(--glass-card); padding: 2.5rem; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); max-height: 85vh; overflow-y: auto; display: block !important; }
        }

        .app-card { background: var(--glass-card); padding: 2.5rem 1.5rem; border-radius: 50px; text-align: center; border: 1px solid rgba(255,255,255,0.1); position: relative; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        .fav-toggle { position: absolute; top: 30px; right: 35px; font-size: 1.6rem; cursor: pointer; color: rgba(255,255,255,0.1); transition: 0.3s; }
        .fav-toggle.active { color: var(--pulp-lime); text-shadow: 0 0 10px rgba(166, 226, 46, 0.4); }

        .input-wrapper { background: rgba(255,255,255,0.03); border: 2px solid rgba(166, 226, 46, 0.2); border-radius: 25px; padding: 15px; margin-bottom: 20px; }
        input { border: none !important; text-align: center; letter-spacing: 8px; font-weight: 900; font-size: 3rem !important; background: transparent !important; color: #fff; width: 100%; outline: none; text-transform: uppercase; }
        .btn-main { background: linear-gradient(135deg, var(--pulp-amber), #ff4500); color: #fff; border-radius: 100px; padding: 15px; font-weight: 900; width: 100%; border: none; text-transform: uppercase; }
        
        .result-display { margin-top: 25px; padding: 25px 20px; border-radius: 35px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.08); position: relative; }
        .bg-perfect { border-color: var(--pulp-lime); color: var(--pulp-lime); }
        .bg-acceptable { border-color: var(--pulp-amber); color: var(--pulp-amber); }
        .bg-old { border-color: var(--pulp-red); color: var(--pulp-red); }
        #daysValue { font-size: 5rem; font-weight: 900; line-height: 1; }

        .btn-copy { background: rgba(166, 226, 46, 0.1); border: 1px solid var(--pulp-lime); color: var(--pulp-lime); border-radius: 15px; padding: 8px 25px; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 15px; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-copy.success { background: var(--pulp-lime); color: #000; }

        .history-section { margin-top: 30px; text-align: left; display: none; }
        .log-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .log-code { font-weight: 900; font-family: monospace; }
        .log-timestamp { display: block; opacity: 0.4; font-size: 0.55rem; font-weight: 800; }

        .hidden { display: none !important; }
        .shake { animation: shake 0.4s both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="edited-image.png" class="splash-logo">
        <div class="splash-text">PULP PRO</div>
    </div>

    <div id="menu-trigger" onclick="toggleMenu()"><span></span></div>

    <div id="menu-drawer">
        <div style="text-align:center; margin-bottom:40px;">
            <img src="edited-image.png" style="width:50px; margin-bottom:10px;">
            <div style="font-weight:900; color:var(--pulp-lime);">PULP PRO</div>
        </div>
        <div class="menu-item" onclick="showHub()">🏠 Home</div>
        <div class="menu-item" onclick="exportHistory()">📊 Export Data</div>
        <div class="menu-item" onclick="clearHistory()" style="color:var(--pulp-red);">⚠️ Clear Logs</div>
    </div>
    <div id="menu-overlay" onclick="toggleMenu()"></div>

    <div id="fruit-hub" class="nav-view">
        <div class="hub-title">Select Commodity</div>
        <div class="selection-grid-container">
            <div class="selection-grid">
                <div class="selection-card" onclick="openMiddleHub('banana')">
                    <img src="banana.png" alt="banana">
                    <div class="commodity-name-section"><span>Banana</span></div>
                </div>
                <div class="selection-card" onclick="openMiddleHub('mango')">
                    <img src="mango.png" alt="mango">
                    <div class="commodity-name-section"><span>Mango</span><span style="color:var(--pulp-amber); font-size:0.6rem; letter-spacing:1px;">(SOON)</span></div>
                </div>
                <div class="selection-card" onclick="openMiddleHub('avocado')">
                    <img src="avocado.png" alt="avocado">
                    <div class="commodity-name-section"><span>Avocado</span><span style="color:var(--pulp-amber); font-size:0.6rem; letter-spacing:1px;">(SOON)</span></div>
                </div>
            </div>
        </div>
        <div id="favorites-section" class="hidden">
            <div class="hub-title" style="color: var(--pulp-amber); font-size: 0.8rem; margin-top:20px;">Saved Favorites</div>
            <div class="fav-grid" id="fav-grid"></div>
        </div>
    </div>

    <div id="middle-hub" class="nav-view hidden">
        <div class="hub-title" id="middleHubTitle">Banana Menu</div>
        <div class="list-container">
            <div class="list-btn" id="brandsBtn" onclick="openBrands(activeFruit)">Banana Brands</div>
            <div class="list-btn disabled">Defects (Soon)</div>
            <div class="list-btn disabled">Ripening (Soon)</div>
        </div>
        <button class="btn-main" style="margin-top:40px; background:transparent; border:1px solid rgba(255,255,255,0.2);" onclick="showHub()">← Back</button>
    </div>

    <div id="brand-hub" class="nav-view hidden">
        <div class="hub-title" id="brandHubTitle">Select Brand</div>
        <div class="list-container" id="brandGrid"></div>
        <button class="btn-main" style="margin-top:40px; background:transparent; border:1px solid rgba(255,255,255,0.2);" onclick="openMiddleHub(activeFruit)">← Back</button>
    </div>

    <div class="app-container" id="appInterface">
        <div class="app-card" id="appCard">
            <i class="bi bi-star-fill fav-toggle" id="favStar" onclick="toggleFavorite()"></i>
            <img src="edited-image.png" style="width:50px; margin-bottom:10px;">
            <div id="brandName" style="font-size: 1.4rem; font-weight: 900; color: var(--pulp-lime); text-transform: uppercase;">Chiquita</div>
            <div id="commodityLabel" style="font-weight: 900; letter-spacing: 4px; opacity: 0.5; font-size: 0.7rem; margin-bottom: 25px;">BANANA AGE CHECKER</div>
            <div class="input-wrapper"><input type="text" id="codeIn" placeholder="---" maxlength="3" autofocus></div>
            <button onclick="checkFruit()" class="btn-main">Calculate</button>
            <div id="resBox" class="result-display">
                <div id="statusLabel" style="font-weight:900;">READY</div>
                <div id="daysValue">--</div>
                <div id="dateText" style="font-size: 1.3rem; font-weight: 900; margin-top: 10px;">-- -- ----</div>
                <button class="btn btn-copy" onclick="copyResult()" id="copyBtn"><i class="bi bi-clipboard"></i> **COPY**</button>
            </div>
            <button class="btn-main" style="margin-top:25px; background:transparent; border:none; opacity:0.4; font-size:0.6rem;" onclick="openBrands(activeFruit)">← Back to Brands</button>
        </div>
        <div id="historySection" class="history-section"><div id="historyList"></div></div>
    </div>

<script>
    let scanHistory = JSON.parse(localStorage.getItem('pulpProHistory')) || [];
    let favorites = JSON.parse(localStorage.getItem('pulpProFavorites')) || [];
    let activeFruit = '';
    let activeBrand = '';

    window.addEventListener('load', () => {
        renderHistory();
        renderFavorites();
        setTimeout(() => { document.body.classList.add('loaded'); }, 2500);
    });

    function toggleMenu() {
        document.getElementById('menu-drawer').classList.toggle('open');
        document.getElementById('menu-overlay').classList.toggle('open');
    }

    function showHub() {
        document.querySelectorAll('.nav-view').forEach(v => v.classList.add('hidden'));
        document.getElementById('fruit-hub').classList.remove('hidden');
        document.getElementById('appInterface').style.display = 'none';
        renderFavorites();
    }

    function openMiddleHub(fruit) {
        activeFruit = fruit;
        document.querySelectorAll('.nav-view').forEach(v => v.classList.add('hidden'));
        document.getElementById('middle-hub').classList.remove('hidden');
        const title = fruit.charAt(0).toUpperCase() + fruit.slice(1);
        document.getElementById('middleHubTitle').innerText = `${title} Menu`;
        document.getElementById('brandsBtn').innerText = `${title} Brands`;
    }

    function openBrands(fruit) {
        activeFruit = fruit;
        document.querySelectorAll('.nav-view').forEach(v => v.classList.add('hidden'));
        document.getElementById('brand-hub').classList.remove('hidden');
        const grid = document.getElementById('brandGrid');
        
        if (fruit === 'banana') {
            grid.innerHTML = `
                <div class="list-btn" onclick="openCalc('Chiquita')">Chiquita</div>
                <div class="list-btn disabled">Fyffes (Soon)</div>
                <div class="list-btn disabled">Favorita (Soon)</div>
                <div class="list-btn disabled">Agrofair (Soon)</div>
                <div class="list-btn disabled">Port (Soon)</div>
            `;
        } else {
            grid.innerHTML = `<div style="opacity:0.5; padding:20px;">Logic for ${fruit} brands coming soon.</div>`;
        }
    }

    function openCalc(brand, fruit = activeFruit) {
        activeBrand = brand;
        activeFruit = fruit;
        document.querySelectorAll('.nav-view').forEach(v => v.classList.add('hidden'));
        document.getElementById('appInterface').style.display = 'flex';
        document.getElementById('brandName').innerText = brand;
        document.getElementById('commodityLabel').innerText = `${activeFruit.toUpperCase()} AGE CHECKER`;
        document.getElementById('codeIn').value = '';
        document.getElementById('resBox').className = 'result-display';
        document.getElementById('daysValue').innerText = '--';
        updateFavoriteUI();
        renderHistory();
    }

    function toggleFavorite() {
        const id = `${activeFruit}_${activeBrand}`;
        const index = favorites.findIndex(f => f.id === id);
        if (index > -1) { favorites.splice(index, 1); } 
        else { favorites.push({ id, fruit: activeFruit, brand: activeBrand }); }
        localStorage.setItem('pulpProFavorites', JSON.stringify(favorites));
        updateFavoriteUI();
    }

    function updateFavoriteUI() {
        const id = `${activeFruit}_${activeBrand}`;
        const isFav = favorites.some(f => f.id === id);
        document.getElementById('favStar').classList.toggle('active', isFav);
    }

    function renderFavorites() {
        const section = document.getElementById('favorites-section');
        const grid = document.getElementById('fav-grid');
        if (favorites.length === 0) { section.classList.add('hidden'); return; }
        section.classList.remove('hidden');
        grid.innerHTML = favorites.map(f => `
            <div class="fav-card" onclick="openCalc('${f.brand}', '${f.fruit}')">
                <i class="bi bi-star-fill"></i>
                <span>${f.brand}</span>
                <small style="opacity:0.5; font-size:0.55rem;">${f.fruit.toUpperCase()}</small>
            </div>
        `).join('');
    }

    const inputField = document.getElementById('codeIn');
    inputField.addEventListener('input', () => { if (inputField.value.length === 3) checkFruit(); });

    function checkFruit(historicalCode = null) {
        const val = historicalCode || inputField.value.toUpperCase();
        if (historicalCode) inputField.value = historicalCode;
        if (val.length < 3) return;

        const mChar = val.charCodeAt(0), dChar = val.charCodeAt(1), yDigit = val.charAt(2);
        const isValid = (mChar >= 65 && mChar <= 76) && (dChar >= 65 && dChar <= 90) && (yDigit === '1' || yDigit === '2');

        if (!isValid) {
            document.getElementById('appCard').classList.add('shake');
            setTimeout(()=>document.getElementById('appCard').classList.remove('shake'), 400);
            return;
        }

        const now = new Date(), m = mChar - 65;
        let d = dChar - 64; if (yDigit === '2') d += 26;
        let hDate = new Date(now.getFullYear(), m, d);
        if (hDate > now) hDate.setFullYear(now.getFullYear() - 1);
        const diff = Math.floor((now - hDate) / (1000*60*60*24));

        document.getElementById('daysValue').innerText = diff;
        document.getElementById('dateText').innerText = hDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();

        const box = document.getElementById('resBox'), label = document.getElementById('statusLabel');
        let statusColor = "";
        if (diff > 31) { label.innerText = "TOO OLD"; box.className = 'result-display bg-old'; statusColor = "#ff4d4d"; }
        else if (diff <= 21) { label.innerText = "PERFECT"; box.className = 'result-display bg-perfect'; statusColor = "#a6e22e"; }
        else { label.innerText = "ACCEPTABLE"; box.className = 'result-display bg-acceptable'; statusColor = "#ff8c00"; }

        if (!historicalCode) saveToHistory(val, diff, statusColor);
    }

    function saveToHistory(code, days, color) {
        const now = new Date();
        const ts = `${now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' })} • ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`.toUpperCase();
        scanHistory.unshift({ code, days, color, timestamp: ts, brand: activeBrand });
        if (scanHistory.length > 25) scanHistory.pop();
        localStorage.setItem('pulpProHistory', JSON.stringify(scanHistory));
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('historyList'), section = document.getElementById('historySection');
        if (scanHistory.length === 0) { section.style.display = "none"; return; }
        
        if (window.innerWidth >= 992) {
            section.style.display = "block";
        } else {
            section.style.display = document.getElementById('daysValue').innerText !== '--' ? "block" : "none";
        }

        list.innerHTML = `<div style="font-size:0.75rem; font-weight:900; color:var(--pulp-lime); margin-bottom:15px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:8px;">ARCHIVE</div>` + scanHistory.map(item => `
            <div class="log-item" onclick="checkFruit('${item.code}')">
                <div class="log-code">${item.code} <small style="font-size:0.5rem; opacity:0.4;">${item.brand || ''}</small></div>
                <div class="log-meta" style="text-align:right;">
                    <span style="color:${item.color}; font-weight:900;">${item.days}D</span>
                    <span class="log-timestamp">${item.timestamp}</span>
                </div>
            </div>
        `).join('');
    }

    function copyResult() {
        const days = document.getElementById('daysValue').innerText, date = document.getElementById('dateText').innerText, code = document.getElementById('codeIn').value.toUpperCase();
        if (days === '--') return;
        const textToCopy = `Pulp Pro Report\nCode:${code}\nAge:${days} Days\nHarvest Date:${date}`;
        navigator.clipboard.writeText(textToCopy).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.classList.add('success');
            btn.innerHTML = `<i class="bi bi-check-lg"></i> **COPIED**`;
            setTimeout(() => { btn.classList.remove('success'); btn.innerHTML = `<i class="bi bi-clipboard"></i> **COPY**`; }, 2000);
        });
    }

    function exportHistory() {
        let csv = "Code,Brand,Days,Timestamp\n" + scanHistory.map(i => `${i.code},${i.brand},${i.days},${i.timestamp}`).join("\n");
        let link = document.createElement("a");
        link.href = "data:text/csv;charset=utf-8," + encodeURI(csv);
        link.download = "pulp_pro_logs.csv";
        link.click();
    }

    function clearHistory() { if(confirm("Wipe logs?")) { scanHistory = []; localStorage.removeItem('pulpProHistory'); renderHistory(); } }
</script>
</body>
</html>
