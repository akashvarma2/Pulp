<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp Pro - Beta 1.4</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --pulp-lime: #a6e22e; --pulp-amber: #ff8c00; --pulp-red: #ff4d4d;
            --bg-black: #000000; --drawer-bg: rgba(18, 18, 18, 0.98);
            --glass-card: rgba(22, 22, 24, 0.98); --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.7); --border-glass: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.03); --shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        body { 
            background-color: var(--bg-black); font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; align-items: flex-start; justify-content: center; 
            min-height: 100vh; margin: 0; color: var(--text-main); overflow-x: hidden; padding: 20px;
        }

        /* Nav Views */
        .nav-view { max-width: 900px; width: 100%; text-align: center; margin-top: 80px; }
        .hidden { display: none !important; }
        .hub-title { font-weight: 900; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; color: var(--pulp-lime); }

        /* Grid System */
        .selection-grid { display: flex; flex-direction: column; gap: 30px; align-items: center; width: 100%; }
        @media (min-width: 768px) { .selection-grid { flex-direction: row; justify-content: center; flex-wrap: wrap; } }

        .selection-card {
            background: var(--glass-card); border: 2px solid var(--border-glass); border-radius: 45px; 
            cursor: pointer; transition: 0.3s ease; display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-end; width: 260px; height: 320px; 
            overflow: hidden; position: relative; box-shadow: var(--shadow);
        }
        .selection-card:hover { border-color: var(--pulp-lime); transform: translateY(-5px); }
        .selection-card i.main-icon { position: absolute; top: 40%; transform: translateY(-50%); font-size: 5rem; color: var(--pulp-lime); opacity: 0.8; }
        .commodity-name-section {
            width: 100%; height: 20%; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; background: var(--glass-card); z-index: 2; padding-bottom: 15px;
        }
        .commodity-name-section span { font-weight: 900; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; }

        /* Camera View */
        #camera-container { width: 100%; max-width: 400px; margin: 0 auto; position: relative; border-radius: 30px; overflow: hidden; border: 2px solid var(--pulp-lime); }
        #video-feed { width: 100%; height: auto; transform: scaleX(1); }
        .camera-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 2px dashed rgba(166, 226, 46, 0.4); pointer-events: none; }
        
        /* AI Result Card */
        .ai-card { background: var(--glass-card); border-radius: 40px; padding: 2rem; border: 1px solid var(--border-glass); text-align: left; margin-top: 20px; }
        .defect-title { color: var(--pulp-red); font-weight: 900; font-size: 1.5rem; text-transform: uppercase; margin-bottom: 10px; }
        .ai-label { font-size: 0.6rem; letter-spacing: 2px; color: var(--pulp-lime); font-weight: 900; }

        .btn-main { background: linear-gradient(135deg, var(--pulp-amber), #ff4500); color: #fff; border-radius: 100px; padding: 15px; font-weight: 900; width: 100%; border: none; text-transform: uppercase; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- Home Hub -->
    <div id="fruit-hub" class="nav-view">
        <div class="hub-title">Select Action</div>
        <div class="selection-grid">
            <div class="selection-card" onclick="openAgeChecker()">
                <i class="bi bi-calendar-check main-icon"></i>
                <div class="commodity-name-section"><span>Age Checker</span></div>
            </div>
            <div class="selection-card" onclick="openDefectHub()">
                <i class="bi bi-camera main-icon" style="color: var(--pulp-amber);"></i>
                <div class="commodity-name-section"><span>Detect Defects</span></div>
            </div>
        </div>
    </div>

    <!-- Defect Commodity Selection -->
    <div id="defect-hub" class="nav-view hidden">
        <div class="hub-title">Detect Defect In:</div>
        <div class="selection-grid">
            <div class="selection-card" style="height: 200px; width: 220px;" onclick="startCamera('Banana')">
                <div class="commodity-name-section" style="height: 100%;"><span>Banana</span></div>
            </div>
            <div class="selection-card" style="height: 200px; width: 220px;" onclick="startCamera('Mango')">
                <div class="commodity-name-section" style="height: 100%;"><span>Mango</span></div>
            </div>
            <div class="selection-card" style="height: 200px; width: 220px;" onclick="startCamera('Avocado')">
                <div class="commodity-name-section" style="height: 100%;"><span>Avocado</span></div>
            </div>
        </div>
        <button class="btn-main" style="background:transparent; border:1px solid var(--border-glass);" onclick="showHub()">← Back</button>
    </div>

    <!-- Camera Interface -->
    <div id="camera-interface" class="nav-view hidden">
        <div class="hub-title" id="camTitle">Analyze Fruit</div>
        <div id="camera-container">
            <video id="video-feed" autoplay playsinline></video>
            <div class="camera-overlay"></div>
        </div>
        <button class="btn-main" onclick="capturePhoto()" id="shutterBtn">Capture & Analyze</button>
        <button class="btn-main" style="background:transparent; border:none; opacity:0.5;" onclick="openDefectHub()">Cancel</button>
    </div>

    <!-- Result Interface -->
    <div id="result-interface" class="nav-view hidden">
        <div class="hub-title">AI Analysis</div>
        <canvas id="photo-canvas" class="hidden"></canvas>
        <div class="ai-card">
            <div class="ai-label">IDENTIFIED DEFECT</div>
            <div class="defect-title" id="resName">Analyzing...</div>
            
            <div class="ai-label" style="margin-top:20px;">PROBABLE CAUSE</div>
            <p id="resCause" style="font-size: 0.9rem; opacity: 0.8;">Processing image data with AI model...</p>

            <div class="ai-label" style="margin-top:20px;">AI RECOMMENDATION</div>
            <p id="resAdvice" style="font-size: 0.9rem; opacity: 0.8;">Waiting for server response...</p>
        </div>
        <button class="btn-main" onclick="openDefectHub()">New Scan</button>
        <button class="btn-main" style="background:transparent; border:1px solid var(--border-glass);" onclick="showHub()">Home</button>
    </div>

    <script>
        let currentStream = null;
        let activeCommodity = "";

        function switchView(id) {
            document.querySelectorAll('.nav-view').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function showHub() { switchView('fruit-hub'); stopCamera(); }
        function openDefectHub() { switchView('defect-hub'); stopCamera(); }
        function openAgeChecker() { alert("Age Checker logic from Master Code 1.3 would trigger here."); }

        async function startCamera(commodity) {
            activeCommodity = commodity;
            document.getElementById('camTitle').innerText = `Scan ${commodity}`;
            switchView('camera-interface');
            
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }, 
                    audio: false 
                });
                document.getElementById('video-feed').srcObject = currentStream;
            } catch (err) {
                alert("Camera access denied or not available.");
                openDefectHub();
            }
        }

        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
        }

        function capturePhoto() {
            const video = document.getElementById('video-feed');
            const canvas = document.getElementById('photo-canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            stopCamera();
            switchView('result-interface');
            simulateAI();
        }

        function simulateAI() {
            // Placeholder for real AI API call
            setTimeout(() => {
                document.getElementById('resName').innerText = "Crown Rot Detected";
                document.getElementById('resCause').innerText = "Fungal infection typically caused by moisture at the cut crown during packing.";
                document.getElementById('resAdvice').innerText = "Ensure proper crown treatment with fungicide and maintain stable temperature during transport. Check humidity levels in container.";
            }, 1500);
        }
    </script>
</body>
</html>
