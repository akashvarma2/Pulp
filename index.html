<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="edited-image.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --pulp-lime: #a6e22e; 
            --pulp-amber: #ff8c00;
            --pulp-red: #ff4d4d;
            --bg-black: #000000;
            --drawer-bg: rgba(18, 18, 18, 0.98);
            --glass-card: rgba(22, 22, 24, 0.98);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.7);
            --border-glass: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.03);
            --shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        /* Desktop Fix: Removed strict overflow hidden */
        body { 
            background-color: var(--bg-black);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto; 
        }

        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease, visibility 1s;
        }

        .splash-logo {
            width: auto;
            height: auto;
            max-width: 80%;
            max-height: 40vh;
            object-fit: contain;
            animation: heroFade 3s ease-in-out forwards;
        }

        @keyframes heroFade {
            0% { transform: scale(0.8); opacity: 0; filter: blur(20px); }
            30% { transform: scale(1); opacity: 1; filter: blur(0px); }
            70% { transform: scale(1); opacity: 1; filter: blur(0px); }
            100% { transform: scale(1.1); opacity: 0; filter: blur(10px); }
        }

        #menu-trigger {
            position: fixed; top: 20px; left: 20px; width: 44px; height: 44px;
            background: var(--input-bg); backdrop-filter: blur(10px);
            border-radius: 12px; z-index: 9900;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-glass); cursor: pointer;
        }

        #menu-trigger span, #menu-trigger span::before, #menu-trigger span::after {
            content: ''; display: block; width: 20px; height: 2px;
            background: var(--text-main); position: absolute; transition: 0.3s;
        }
        #menu-trigger span::before { top: -6px; }
        #menu-trigger span::after { bottom: -6px; }

        #menu-drawer {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: var(--drawer-bg); z-index: 9995;
            transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 20px; backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-glass);
        }
        #menu-drawer.open { left: 0; }

        #menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 9994;
            display: none; backdrop-filter: blur(4px);
        }
        #menu-overlay.open { display: block; }

        .nav-view {
            width: 100%; max-width: 900px; text-align: center;
            padding: 100px 20px 40px; /* Space for menu trigger */
        }

        .hidden { display: none !important; }

        /* Grid - Desktop Optimized */
        .selection-grid { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; margin-top: 40px; }
        .selection-card {
            background: var(--glass-card); border: 2px solid var(--border-glass);
            border-radius: 50px; width: 280px; height: 350px;
            overflow: hidden; cursor: pointer; transition: 0.4s;
            position: relative; box-shadow: var(--shadow);
        }
        .selection-card:hover { border-color: var(--pulp-lime); transform: translateY(-10px); }
        .selection-card img { width: 100%; height: 80%; object-fit: cover; }
        .card-label { height: 20%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }

        .list-container { display: flex; flex-direction: column; gap: 20px; max-width: 450px; margin: 40px auto; }
        .list-btn {
            background: var(--glass-card); border: 1px solid var(--border-glass);
            padding: 25px; border-radius: 25px; cursor: pointer;
            font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
        }

        /* App Layout - Responsive */
        .app-container { display: none; flex-direction: column; gap: 40px; width: 100%; max-width: 450px; padding-top: 100px; }
        .app-card {
            background: var(--glass-card); padding: 3rem 2rem; border-radius: 60px;
            border: 1px solid var(--border-glass); text-align: center; box-shadow: var(--shadow);
        }

        .input-wrapper {
            background: var(--input-bg); border: 2px solid rgba(166, 226, 46, 0.2);
            border-radius: 30px; padding: 20px; margin-bottom: 30px;
        }
        input {
            background: transparent; border: none; color: #fff;
            font-size: 3.5rem; font-weight: 900; text-align: center;
            width: 100%; outline: none; letter-spacing: 10px; text-transform: uppercase;
        }

        .btn-main {
            background: linear-gradient(135deg, var(--pulp-amber), #ff4500);
            color: #fff; border: none; padding: 20px; border-radius: 100px;
            width: 100%; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
        }

        .result-display { margin-top: 30px; padding: 30px; border-radius: 40px; background: var(--input-bg); border: 1px solid var(--border-glass); }
        .bg-perfect { border-color: var(--pulp-lime); color: var(--pulp-lime); }
        .bg-acceptable { border-color: var(--pulp-amber); color: var(--pulp-amber); }
        .bg-old { border-color: var(--pulp-red); color: var(--pulp-red); }

        .history-section { margin-top: 40px; width: 100%; }
        .log-item { display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid var(--border-glass); cursor: pointer; }

        /* Desktop View Refinement */
        @media (min-width: 992px) {
            .app-container { flex-direction: row; max-width: 1000px; align-items: flex-start; justify-content: center; }
            .history-section { max-width: 400px; background: var(--glass-card); border-radius: 40px; padding: 20px; border: 1px solid var(--border-glass); }
        }
    </style>
</head>
<body>

    <div id="splash-screen"><img src="edited-image.png" class="splash-logo"></div>

    <div id="menu-trigger" onclick="toggleMenu()"><span></span></div>
    <div id="menu-overlay" onclick="toggleMenu()"></div>
    <div id="menu-drawer">
        <div style="text-align:center; margin-bottom:50px;"><img src="edited-image.png" style="width:60px;"></div>
        <div class="list-btn" style="margin-bottom:15px;" onclick="showHub(); toggleMenu();">🏠 Home</div>
        <div class="list-btn" onclick="clearHistory();" style="color:var(--pulp-red);">⚠️ Clear Logs</div>
    </div>

    <!-- MAIN HUB -->
    <div id="fruit-hub" class="nav-view">
        <h1 style="font-weight:900; color:var(--pulp-lime); letter-spacing:5px;">PULP PRO</h1>
        <div class="selection-grid">
            <div class="selection-card" onclick="openMiddleHub('banana')">
                <img src="banana.png"><div class="card-label">Banana</div>
            </div>
            <div class="selection-card" style="opacity:0.5; cursor:not-allowed;">
                <img src="mango.png"><div class="card-label">Mango (Soon)</div>
            </div>
        </div>
    </div>

    <!-- MIDDLE HUB -->
    <div id="middle-hub" class="nav-view hidden">
        <h2 id="middleTitle" style="font-weight:900; color:var(--pulp-lime);">BANANA HUB</h2>
        <div class="list-container">
            <div class="list-btn" onclick="openBrands()">Brands</div>
            <div class="list-btn disabled">Common Defects</div>
        </div>
        <button class="btn-main" style="background:transparent; border:1px solid var(--border-glass); color:white;" onclick="showHub()">← Back</button>
    </div>

    <!-- BRANDS HUB -->
    <div id="brand-hub" class="nav-view hidden">
        <h2 style="font-weight:900; color:var(--pulp-lime);">SELECT BRAND</h2>
        <div class="list-container">
            <div class="list-btn" onclick="openCalc('Chiquita')">Chiquita</div>
            <div class="list-btn disabled">Fyffes (Soon)</div>
        </div>
        <button class="btn-main" style="background:transparent; border:1px solid var(--border-glass); color:white;" onclick="openMiddleHub('banana')">← Back</button>
    </div>

    <!-- CALCULATOR -->
    <div id="appInterface" class="app-container">
        <div class="app-card">
            <h3 id="activeBrandName" style="font-weight:900; color:var(--pulp-lime); letter-spacing:4px;">CHIQUITA</h3>
            <div class="input-wrapper"><input type="text" id="codeIn" maxlength="3" placeholder="---" autofocus spellcheck="false"></div>
            <button class="btn-main" onclick="checkFruit()">Analyze Code</button>
            <div id="resBox" class="result-display hidden">
                <div id="statusLabel" style="font-weight:900; font-size:0.8rem;">READY</div>
                <div id="daysValue" style="font-size:6rem; font-weight:900; line-height:1;">--</div>
                <div id="dateText" style="font-weight:700; opacity:0.8;">-- -- ----</div>
            </div>
            <button class="btn-main" style="margin-top:30px; background:transparent; border:none; opacity:0.3; font-size:0.7rem; color:white;" onclick="openBrands()">← Switch Brand</button>
        </div>
        <div class="history-section" id="histSection">
            <div style="font-weight:900; color:var(--pulp-lime); margin-bottom:15px; border-bottom:1px solid var(--border-glass); padding-bottom:10px;">RECENT SCANS</div>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        let scanHistory = JSON.parse(localStorage.getItem('pulpProHistory')) || [];

        // DESKTOP SAFETY: Force show app after 3.5 seconds even if window.load is weird
        function removeSplash() {
            const splash = document.getElementById('splash-screen');
            if (splash) {
                splash.style.opacity = '0';
                setTimeout(() => { splash.style.visibility = 'hidden'; splash.style.display = 'none'; }, 1000);
            }
        }

        window.addEventListener('load', () => {
            setTimeout(removeSplash, 2500);
            renderHistory();
        });

        // Fail-safe for Desktop Chrome
        setTimeout(removeSplash, 4000);

        function toggleMenu() {
            document.getElementById('menu-drawer').classList.toggle('open');
            document.getElementById('menu-overlay').classList.toggle('open');
        }

        function switchView(viewId) {
            document.querySelectorAll('.nav-view').forEach(v => v.classList.add('hidden'));
            document.getElementById('appInterface').style.display = 'none';
            if(viewId === 'appInterface') {
                document.getElementById('appInterface').style.display = 'flex';
            } else {
                document.getElementById(viewId).classList.remove('hidden');
            }
            window.scrollTo(0,0);
        }

        function showHub() { switchView('fruit-hub'); }
        function openMiddleHub(f) { switchView('middle-hub'); }
        function openBrands() { switchView('brand-hub'); }
        function openCalc(b) { 
            document.getElementById('activeBrandName').innerText = b.toUpperCase();
            document.getElementById('codeIn').value = '';
            document.getElementById('resBox').classList.add('hidden');
            switchView('appInterface'); 
        }

        function checkFruit(hCode = null) {
            const input = document.getElementById('codeIn');
            const val = (hCode || input.value).toUpperCase();
            if (hCode) input.value = hCode;
            if (val.length < 3) return;
            
            const mChar = val.charCodeAt(0), dChar = val.charCodeAt(1), yDigit = val.charAt(2);
            const isValid = (mChar >= 65 && mChar <= 76) && (dChar >= 65 && dChar <= 90) && (yDigit === '1' || yDigit === '2');

            if (!isValid) return alert("Invalid Format");

            const now = new Date(), m = mChar - 65;
            let d = dChar - 64; if (yDigit === '2') d += 26;

            let hDate = new Date(now.getFullYear(), m, d);
            if (hDate > now) hDate.setFullYear(now.getFullYear() - 1);
            const diff = Math.floor((now - hDate) / (1000*60*60*24));

            const box = document.getElementById('resBox');
            box.classList.remove('hidden');
            document.getElementById('daysValue').innerText = diff;
            document.getElementById('dateText').innerText = hDate.toDateString().toUpperCase();

            const status = document.getElementById('statusLabel');
            if (diff > 31) { status.innerText = "TOO OLD"; box.className = 'result-display bg-old'; }
            else if (diff <= 21) { status.innerText = "PERFECT"; box.className = 'result-display bg-perfect'; }
            else { status.innerText = "ACCEPTABLE"; box.className = 'result-display bg-acceptable'; }

            if(!hCode) {
                scanHistory.unshift({code: val, days: diff});
                if(scanHistory.length > 15) scanHistory.pop();
                localStorage.setItem('pulpProHistory', JSON.stringify(scanHistory));
                renderHistory();
            }
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = scanHistory.map(item => `
                <div class="log-item" onclick="checkFruit('${item.code}')">
                    <b style="color:var(--pulp-lime); font-family:monospace;">${item.code}</b>
                    <span>${item.days} DAYS OLD</span>
                </div>
            `).join('');
        }

        function clearHistory() {
            if(confirm("Wipe scan logs?")) { scanHistory = []; localStorage.removeItem('pulpProHistory'); renderHistory(); }
        }
    </script>
</body>
</html>
