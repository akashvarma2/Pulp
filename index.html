<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp Pro</title>
    
    <style>
        :root {
            --pulp-lime: #a6e22e; 
            --bg-black: #000000;
            --glass: rgba(30, 30, 32, 0.9);
        }

        body { 
            background: var(--bg-black);
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* SPLASH SCREEN - CENTERED FOR MOBILE */
        #splash {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s;
        }
        .splash-img { width: 100px; height: 100px; border-radius: 20px; object-fit: cover; }
        .splash-title { margin-top: 15px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; }

        /* HEADER */
        header {
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #222;
        }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-box img { height: 30px; border-radius: 5px; }

        /* VIEW CONTAINER */
        .container { padding: 20px; flex: 1; }
        .hidden { display: none !important; }

        /* COMMODITY BLOCKS */
        .grid { display: flex; flex-direction: column; gap: 15px; }
        .card {
            position: relative; height: 180px; border-radius: 20px;
            overflow: hidden; border: 1px solid #333;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .overlay {
            position: absolute; bottom:0; left:0; width:100%; height:100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            display: flex; align-items: flex-end; padding: 20px;
        }

        /* CALC BOX */
        .calc-ui { background: var(--glass); padding: 25px; border-radius: 30px; text-align: center; border: 1px solid #333; }
        input { 
            background: #111; border: 2px solid var(--pulp-lime); border-radius: 15px;
            color: #fff; font-size: 3rem; width: 100%; text-align: center; 
            margin: 20px 0; font-weight: 900; outline: none;
        }
        .main-btn { 
            background: var(--pulp-lime); color: #000; border: none; 
            width: 100%; padding: 18px; border-radius: 50px; font-weight: 900;
            text-transform: uppercase; cursor: pointer;
        }

        /* RESULTS BOX */
        .result-box { margin-top: 20px; padding: 20px; border-radius: 20px; background: #111; }
        .days-big { font-size: 4rem; font-weight: 900; color: var(--pulp-lime); }
    </style>
</head>
<body class="loading">

    <div id="splash">
        <img src="edited-image.png" class="splash-img" onerror="this.src='https://placehold.co/100x100/a6e22e/000?text=P'">
        <div class="splash-title">Pulp Pro</div>
    </div>

    <header>
        <div class="logo-box">
            <img src="edited-image.png" onerror="this.style.display='none'">
            <span style="font-weight: 900;">Pulp Pro</span>
        </div>
        <div onclick="location.reload()" style="font-size: 1.2rem;">🏠</div>
    </header>

    <div class="container">
        <div id="menu">
            <h2 style="font-weight: 800;">Select Commodity</h2>
            <div class="grid">
                <div class="card" onclick="goCalc('Banana')">
                    <img src="banana.png" onerror="this.src='https://placehold.co/400x200/111/FFF?text=Banana'">
                    <div class="overlay"><span style="font-weight: 800; font-size: 1.4rem;">Banana</span></div>
                </div>
                <div class="card" onclick="goCalc('Mango')">
                    <img src="mango.png" onerror="this.src='https://placehold.co/400x200/111/FFF?text=Mango'">
                    <div class="overlay"><span style="font-weight: 800; font-size: 1.4rem;">Mango (Soon)</span></div>
                </div>
            </div>
        </div>

        <div id="calc" class="hidden">
            <div class="calc-ui">
                <h3 id="fruit-name" style="color: var(--pulp-lime); margin: 0;">FRUIT</h3>
                <input type="text" id="codeIn" maxlength="3" placeholder="---">
                <button class="main-btn" onclick="calculate()">Calculate</button>
                
                <div id="result" class="result-box hidden">
                    <div style="font-size: 0.8rem; opacity: 0.5; font-weight: 800;">AGE DETECTED</div>
                    <div id="daysOut" class="days-big">0</div>
                    <div style="font-size: 0.7rem; font-weight: 700;">DAYS FROM HARVEST</div>
                </div>

                <button onclick="goMenu()" style="background:none; border:none; color:#555; margin-top:25px; width:100%;">← Back</button>
            </div>
        </div>
    </div>

<script>
    window.onload = () => {
        setTimeout(() => { document.getElementById('splash').style.opacity = '0'; 
        setTimeout(() => document.getElementById('splash').classList.add('hidden'), 500); }, 2000);
    };

    function goCalc(name) {
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('calc').classList.remove('hidden');
        document.getElementById('fruit-name').innerText = name.toUpperCase() + " CHECKER";
        document.getElementById('codeIn').value = '';
        document.getElementById('result').classList.add('hidden');
    }

    function goMenu() {
        document.getElementById('calc').classList.add('hidden');
        document.getElementById('menu').classList.remove('hidden');
    }

    function calculate() {
        const val = document.getElementById('codeIn').value.toUpperCase();
        if (val.length < 3) return;

        // ORIGINAL LOGIC RESTORED
        const monthCode = val.charCodeAt(0) - 65; 
        let dayCode = val.charCodeAt(1) - 64; 
        const yearDigit = val.charAt(2);
        if (yearDigit === '2') dayCode += 26;

        const now = new Date();
        let harvest = new Date(now.getFullYear(), monthCode, dayCode);
        if (harvest > now) harvest.setFullYear(now.getFullYear() - 1);

        const diff = Math.floor((now - harvest) / (1000 * 60 * 60 * 24));
        
        document.getElementById('result').classList.remove('hidden');
        document.getElementById('daysOut').innerText = diff;
    }
</script>
</body>
</html>
