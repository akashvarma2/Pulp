<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp Pro</title>
    
    <style>
        :root {
            --pulp-lime: #a6e22e; 
            --pulp-amber: #ff8c00;
            --bg-black: #000000;
            --glass-card: rgba(30, 30, 32, 0.85);
        }

        body { 
            background-color: var(--bg-black);
            background-image: radial-gradient(circle at top right, #1a1a1a, #000);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; color: #fff; overflow-x: hidden;
        }

        /* SPLASH SCREEN - THE "LOGO + NAME" FIX */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-logo-container { text-align: center; }
        .splash-logo { 
            width: 90px; height: 90px; border-radius: 22px; 
            background: var(--pulp-lime); /* Fallback color if image is missing */
            object-fit: cover; animation: heroPulse 2s infinite ease-in-out;
            box-shadow: 0 0 30px rgba(166, 226, 46, 0.2);
        }
        .splash-name { 
            margin-top: 15px; font-weight: 900; letter-spacing: 6px; 
            color: #fff; text-transform: uppercase; font-size: 1.2rem;
        }
        @keyframes heroPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .loaded #splash-screen { opacity: 0; visibility: hidden; }

        /* HEADER */
        .header-main {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo-group { display: flex; align-items: center; gap: 12px; }
        .logo-group img { height: 32px; border-radius: 6px; }
        .logo-group span { font-weight: 900; font-size: 1.3rem; letter-spacing: 1px; }

        /* HUB VIEW */
        .app-view { padding: 20px; max-width: 900px; margin: 0 auto; opacity: 0; transition: 0.5s; }
        .loaded .app-view { opacity: 1; }
        .hidden { display: none !important; }

        .section-title { font-weight: 800; font-size: 1.6rem; margin: 20px 0; letter-spacing: -0.5px; }
        .selection-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        
        .selection-card {
            position: relative; height: 380px; border-radius: 28px; overflow: hidden;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1); background: #111;
        }
        .card-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .card-overlay { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 60%);
            z-index: 2; display: flex; flex-direction: column; justify-content: flex-end; padding: 25px;
        }
        .card-title { font-weight: 800; font-size: 1.2rem; color: #fff; margin: 0; }

        /* BRANDS & CALC */
        .brand-btn { background: var(--glass-card); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 20px; text-align: center; font-weight: 900; cursor: pointer; margin-bottom: 12px; }
        .btn-main { background: var(--pulp-lime); color: #000; border: none; padding: 18px; border-radius: 50px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .input-box { background: rgba(255,255,255,0.05); border: 2px solid var(--pulp-lime); padding: 15px; border-radius: 20px; margin: 20px 0; font-size: 3rem; color: #fff; text-align: center; width: 100%; outline: none; font-weight: 900; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo-container">
            <img src="edited-image.png" class="splash-logo" onerror="this.style.display='none'; document.getElementById('fallback-logo').style.display='flex';">
            <div id="fallback-logo" style="display:none; width:90px; height:90px; background:var(--pulp-lime); border-radius:22px; align-items:center; justify-content:center; font-weight:900; font-size:3rem; color:#000; margin:0 auto;">P</div>
            <div class="splash-name">Pulp Pro</div>
        </div>
    </div>

    <div class="header-main">
        <div class="logo-group">
            <img src="edited-image.png" onerror="this.src='https://placehold.co/100x100/a6e22e/000?text=P'">
            <span>Pulp Pro</span>
        </div>
        <div style="font-size:1.5rem; cursor:pointer;">☰</div>
    </div>

    <div id="view-hub" class="app-view">
        <div class="section-title">Select Commodity</div>
        <div class="selection-grid">
            <div class="selection-card" onclick="openBrands('banana')">
                <img src="banana.png" class="card-img" onerror="this.src='https://placehold.co/400x600/111/FFF?text=Banana'">
                <div class="card-overlay"><p class="card-title">Banana</p></div>
            </div>
            <div class="selection-card" onclick="openBrands('mango')">
                <img src="mango.png" class="card-img" onerror="this.src='https://placehold.co/400x600/111/FFF?text=Mango'">
                <div class="card-overlay"><p class="card-title">Mango <small style="color:var(--pulp-amber); font-size:0.6rem;">(SOON)</small></p></div>
            </div>
            <div class="selection-card" onclick="openBrands('avocado')">
                <img src="avocado.png" class="card-img" onerror="this.src='https://placehold.co/400x600/111/FFF?text=Avocado'">
                <div class="card-overlay"><p class="card-title">Avocado <small style="color:var(--pulp-amber); font-size:0.6rem;">(SOON)</small></p></div>
            </div>
        </div>
    </div>

    <div id="view-brands" class="app-view hidden">
        <div class="section-title" id="brand-title">BRANDS</div>
        <div id="brand-list"></div>
        <button onclick="showHub()" style="background:none; border:none; color:#555; width:100%; margin-top:20px; cursor:pointer;">← Back to Hub</button>
    </div>

    <div id="view-calc" class="app-view hidden">
        <div style="background:var(--glass-card); padding:2rem; border-radius:40px; text-align:center;">
            <div id="active-brand" style="color:var(--pulp-lime); font-weight:900; font-size:2rem;">CHIQUITA</div>
            <div id="active-fruit" style="opacity:0.5; font-weight:700;">FRUIT CHECKER</div>
            <input type="text" class="input-box" id="codeIn" placeholder="---" maxlength="3">
            <button class="btn-main" onclick="alert('Calculating Age...')">Calculate</button>
            <button onclick="showBrands()" style="background:none; border:none; color:#555; width:100%; margin-top:30px; cursor:pointer;">← Back to Brands</button>
        </div>
    </div>

<script>
    let currentFruit = '';

    window.onload = () => {
        // Keeps splash screen visible for 2.5 seconds for branding impact
        setTimeout(() => { document.body.classList.add('loaded'); }, 2500);
    };

    function showHub() {
        document.querySelectorAll('.app-view').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-hub').classList.remove('hidden');
    }

    function openBrands(fruit) {
        currentFruit = fruit;
        document.querySelectorAll('.app-view').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-brands').classList.remove('hidden');
        document.getElementById('brand-title').innerText = fruit.toUpperCase() + " BRANDS";
        
        const list = document.getElementById('brand-list');
        list.innerHTML = fruit === 'banana' ? 
            `<div class="brand-btn" onclick="openCalc('Chiquita')">CHIQUITA</div>` :
            `<div style="opacity:0.3; text-align:center; padding:50px;">No active brands for ${fruit}</div>`;
    }

    function openCalc(brand) {
        document.querySelectorAll('.app-view').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-calc').classList.remove('hidden');
        document.getElementById('active-brand').innerText = brand.toUpperCase();
        document.getElementById('active-fruit').innerText = currentFruit.toUpperCase() + " CHECKER";
    }

    function showBrands() { openBrands(currentFruit); }
</script>
</body>
</html>
