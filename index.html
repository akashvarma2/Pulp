<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --perfect-green: #2ecc71;
            --acceptable-orange: #f39c12;
            --old-red: #e74c3c;
            --bg-black: #000000;
            --card-grey: #1c1c1e;
            --text-white: #ffffff;
            --border-grey: #3a3a3c;
        }

        /* 1. SMOOTH OPENING OVERLAY */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-black); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
        }

        #splash-logo {
            width: 120px; height: 120px;
            animation: pulseIn 1.2s ease-out forwards;
        }

        @keyframes pulseIn {
            0% { transform: scale(0.85); opacity: 0; filter: blur(10px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0px); }
        }

        .loaded #splash-screen {
            opacity: 0; visibility: hidden;
        }

        /* MAIN APP STYLES */
        body { 
            background-color: var(--bg-black);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;
            color: var(--text-white); overflow: hidden;
        }

        .app-card {
            background: var(--card-grey);
            padding: 2.5rem 1.5rem; border-radius: 40px;
            width: 92%; max-width: 360px; text-align: center;
            border: 1px solid var(--border-grey);
            /* Entrance Animation for the card itself */
            transform: translateY(20px); opacity: 0;
            transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1) 0.2s;
        }

        .loaded .app-card { transform: translateY(0); opacity: 1; }

        /* Rest of the Master Code UI */
        .input-wrapper {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-grey);
            border-radius: 20px; padding: 15px; margin-bottom: 20px;
        }

        input {
            border: none !important; text-align: center; letter-spacing: 8px;
            font-weight: 900; font-size: 2.8rem !important; background: transparent !important;
            color: var(--text-white); width: 100%; outline: none; text-transform: uppercase;
        }

        .result-display {
            margin-top: 25px; padding: 20px; border-radius: 30px;
            background: rgba(255, 255, 255, 0.03); transition: all 0.4s ease;
            border: 1px solid var(--border-grey);
        }

        .bg-perfect { background-color: var(--perfect-green) !important; }
        .bg-acceptable { background-color: var(--acceptable-orange) !important; }
        .bg-old { background-color: var(--old-red) !important; }

        #daysValue { font-size: 5.5rem; font-weight: 900; line-height: 1; }
        #dateText { display: block; font-size: 1.8rem; font-weight: 900; color: #fff; margin-top: 5px; }

        .btn-main { background: #fff; color: #00; border-radius: 50px; padding: 16px; font-weight: 800; width: 100%; border: none; }
        .btn-copy { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--border-grey); border-radius: 12px; padding: 8px 15px; font-size: 0.75rem; font-weight: 700; margin-top: 15px; display: none; width: 100%; text-transform: uppercase; }

        .shake { animation: shake 0.4s both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="icon-192.png" id="splash-logo" alt="Pulp">
        <h1 style="margin-top: 20px; font-weight: 900; letter-spacing: 2px;">PULP</h1>
    </div>

<div class="app-card" id="appCard">
    <div style="font-size: 3rem; margin-bottom: 5px;">🍌</div>
    <h2 style="font-weight:900; letter-spacing: -1px; margin-top: 0; opacity: 0.8;">PULP</h2>
    
    <div class="input-wrapper">
        <input type="text" id="codeIn" placeholder="---" maxlength="3" 
               inputmode="text" autocapitalize="characters" autofocus autocomplete="off">
    </div>
    
    <button onclick="checkBanana()" class="btn-main">CALCULATE</button>

    <div id="resBox" class="result-display">
        <div id="statusLabel" style="font-weight:900;">READY</div>
        <div id="daysValue">--</div>
        <div style="font-size: 0.75rem; font-weight:800;">DAYS FROM HARVEST</div>
        
        <div style="margin-top:15px; padding-top:15px; border-top: 1px solid rgba(255,255,255,0.1);">
            <span style="font-size:0.75rem; font-weight:800; opacity:0.6;">HARVEST DATE</span>
            <span id="dateText">-- -- ----</span>
        </div>

        <button id="copyBtn" onclick="copyToClipboard()" class="btn-copy">Copy to Email</button>
    </div>
</div>

<script>
    // 2. TRIGGER THE SMOOTH OPENING
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.body.classList.add('loaded');
        }, 1000); // 1 second delay to let the splash settle
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

    const inputField = document.getElementById('codeIn');
    const card = document.getElementById('appCard');
    const copyBtn = document.getElementById('copyBtn');

    inputField.addEventListener('input', () => { if (inputField.value.length === 3) checkBanana(); });

    function checkBanana() {
        const val = inputField.value.toUpperCase();
        if (val.length < 3) return;

        const box = document.getElementById('resBox');
        const label = document.getElementById('statusLabel');
        const daysVal = document.getElementById('daysValue');
        const dateTxt = document.getElementById('dateText');

        const mChar = val.charCodeAt(0);
        const dChar = val.charCodeAt(1);
        const yDigit = val.charAt(2);
        const isValid = (mChar >= 65 && mChar <= 76) && (dChar >= 65 && dChar <= 90) && (yDigit === '1' || yDigit === '2');

        if (!isValid) {
            triggerFeedback('error');
            box.className = 'result-display';
            label.innerText = "INVALID CODE";
            daysVal.innerText = "ERR";
            copyBtn.style.display = "none";
            return;
        }

        const now = new Date();
        const m = mChar - 65;
        let d = dChar - 64;
        if (yDigit === '2') d += 26;
        let hDate = new Date(now.getFullYear(), m, d);
        if (hDate > now) hDate.setFullYear(now.getFullYear() - 1);
        const diff = Math.floor((now - hDate) / (1000*60*60*24));

        daysVal.innerText = diff;
        dateTxt.innerText = hDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();
        
        box.className = 'result-display';
        copyBtn.style.display = "block";

        if (diff > 31) { triggerFeedback('error'); label.innerText = "TOO OLD"; box.classList.add('bg-old'); }
        else if (diff <= 21) { triggerFeedback('success'); label.innerText = "PERFECT"; box.classList.add('bg-perfect'); }
        else { triggerFeedback('success'); label.innerText = "ACCEPTABLE"; box.classList.add('bg-acceptable'); }
    }

    function copyToClipboard() {
        const text = `Code: ${inputField.value.toUpperCase()}\nAge: ${daysVal.innerText}\nHarvest date: ${dateText.innerText}`;
        navigator.clipboard.writeText(text).then(() => {
            const oldText = copyBtn.innerText;
            copyBtn.innerText = "COPIED!";
            setTimeout(() => { copyBtn.innerText = oldText; }, 2000);
        });
    }

    function triggerFeedback(type) {
        card.classList.remove('shake');
        void card.offsetWidth;
        if (type === 'error') card.classList.add('shake');
        if ("vibrate" in navigator) navigator.vibrate(type === 'error' ? [150, 50, 150] : 40);
    }
</script>
</body>
</html>
