<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --pulp-lime: #a6e22e; 
            --pulp-amber: #ff8c00;
            --pulp-red: #ff4d4d;
            --bg-black: #000000;
            --glass-panel: rgba(20, 20, 22, 0.9);
            --glow-strength: 0 0 20px;
        }

        /* SPLASH SCREEN */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-black); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
        }
        #splash-logo { width: 140px; height: 140px; animation: pulseIn 1.2s ease-out forwards; }
        @keyframes pulseIn {
            0% { transform: scale(0.8); opacity: 0; filter: blur(10px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0px); }
        }
        .loaded #splash-screen { opacity: 0; visibility: hidden; }

        /* BODY & LAYOUT */
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;
            color: #fff; overflow: hidden;
        }

        .app-card {
            background: var(--glass-panel);
            padding: 2rem 1.5rem; border-radius: 40px;
            width: 92%; max-width: 360px; text-align: center;
            border: 1px solid rgba(166, 226, 46, 0.15);
            box-shadow: 0 10px 50px rgba(0,0,0,0.5), 0 0 30px rgba(166, 226, 46, 0.05);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            transform: translateY(20px); opacity: 0;
            transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1) 0.2s;
        }
        .loaded .app-card { transform: translateY(0); opacity: 1; }

        /* HEADER EMOJI & TITLE */
        .emoji-header { font-size: 3rem; margin-bottom: 0px; filter: drop-shadow(0 0 8px rgba(166, 226, 46, 0.4)); }
        .checker-title { 
            font-weight: 900; letter-spacing: 2px; text-transform: uppercase; 
            font-size: 0.9rem; color: var(--pulp-lime); margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(166, 226, 46, 0.3);
        }

        /* INPUT SECTION */
        .input-wrapper {
            background: rgba(166, 226, 46, 0.03);
            border: 2px solid rgba(166, 226, 46, 0.2);
            border-radius: 24px; padding: 15px; margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .input-wrapper:focus-within {
            border-color: var(--pulp-lime);
            box-shadow: var(--glow-strength) rgba(166, 226, 46, 0.3);
        }
        input {
            border: none !important; text-align: center; letter-spacing: 8px;
            font-weight: 900; font-size: 3rem !important; background: transparent !important;
            color: #fff; width: 100%; outline: none; text-transform: uppercase;
        }

        /* BUTTONS */
        .btn-main {
            background: linear-gradient(135deg, var(--pulp-amber), #ff5e00);
            color: #fff; border-radius: 50px; padding: 18px; 
            font-weight: 800; width: 100%; border: none;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 5px 20px rgba(255, 140, 0, 0.3);
        }
        .btn-main:active { transform: scale(0.96); }

        .btn-copy {
            background: rgba(255,255,255,0.05); color: #fff;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            padding: 10px; font-size: 0.75rem; font-weight: 700;
            margin-top: 15px; display: none; width: 100%; text-transform: uppercase;
        }

        /* RESULT DISPLAY */
        .result-display {
            margin-top: 25px; padding: 20px; border-radius: 30px;
            background: rgba(255, 255, 255, 0.02); transition: all 0.4s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .bg-perfect { border-color: var(--pulp-lime); color: var(--pulp-lime); box-shadow: var(--glow-strength) rgba(166, 226, 46, 0.2); }
        .bg-acceptable { border-color: var(--pulp-amber); color: var(--pulp-amber); box-shadow: var(--glow-strength) rgba(255, 140, 0, 0.2); }
        .bg-old { border-color: var(--pulp-red); color: var(--pulp-red); box-shadow: var(--glow-strength) rgba(255, 77, 77, 0.2); }

        #daysValue { font-size: 5.5rem; font-weight: 900; line-height: 1; }
        #statusLabel { font-weight: 900; letter-spacing: 2px; }
        .label-sub { font-size: 0.7rem; opacity: 0.6; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }

        .shake { animation: shake 0.4s both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="icon-192.png" id="splash-logo" alt="Pulp">
        <h2 style="margin-top: 20px; font-weight: 900; letter-spacing: 4px; color: var(--pulp-lime);">PULP PRO</h2>
    </div>

<div class="app-card" id="appCard">
    <div class="emoji-header">🍌</div>
    <div class="checker-title">Age Checker</div>
    
    <div class="input-wrapper">
        <input type="text" id="codeIn" placeholder="---" maxlength="3" inputmode="text" autocapitalize="characters" autofocus autocomplete="off">
    </div>
    
    <button onclick="checkBanana()" class="btn-main">Calculate Freshness</button>

    <div id="resBox" class="result-display">
        <div id="statusLabel">READY</div>
        <div id="daysValue">--</div>
        <div class="label-sub">Days from Harvest</div>
        
        <div style="margin-top:15px; padding-top:15px; border-top: 1px solid rgba(255,255,255,0.05);">
            <div class="label-sub">Estimated Harvest Date</div>
            <span id="dateText" style="font-size: 1.4rem; font-weight: 900;">-- -- ----</span>
        </div>

        <button id="copyBtn" onclick="copyToClipboard()" class="btn-copy">Copy to Email</button>
    </div>

    <img src="icon-192.png" style="width: 30px; height: 30px; margin-top: 20px; opacity: 0.5; filter: grayscale(1);">
</div>

<script>
    window.addEventListener('load', () => {
        setTimeout(() => { document.body.classList.add('loaded'); }, 1000);
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

    const inputField = document.getElementById('codeIn');
    const card = document.getElementById('appCard');
    const copyBtn = document.getElementById('copyBtn');

    inputField.addEventListener('input', () => { if (inputField.value.length === 3) checkBanana(); });

    function checkBanana() {
        const val = inputField.value.toUpperCase();
        if (val.length < 3) return;

        const box = document.getElementById('resBox');
        const label = document.getElementById('statusLabel');
        const daysVal = document.getElementById('daysValue');
        const dateTxt = document.getElementById('dateText');

        const mChar = val.charCodeAt(0);
        const dChar = val.charCodeAt(1);
        const yDigit = val.charAt(2);
        const isValid = (mChar >= 65 && mChar <= 76) && (dChar >= 65 && dChar <= 90) && (yDigit === '1' || yDigit === '2');

        if (!isValid) {
            triggerFeedback('error');
            box.className = 'result-display';
            label.innerText = "INVALID CODE";
            daysVal.innerText = "ERR";
            copyBtn.style.display = "none";
            return;
        }

        const now = new Date();
        const m = mChar - 65;
        let d = dChar - 64;
        if (yDigit === '2') d += 26;
        let hDate = new Date(now.getFullYear(), m, d);
        if (hDate > now) hDate.setFullYear(now.getFullYear() - 1);
        const diff = Math.floor((now - hDate) / (1000*60*60*24));

        daysVal.innerText = diff;
        dateTxt.innerText = hDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();
        
        box.className = 'result-display';
        copyBtn.style.display = "block";

        if (diff > 31) { triggerFeedback('error'); label.innerText = "TOO OLD"; box.classList.add('bg-old'); }
        else if (diff <= 21) { triggerFeedback('success'); label.innerText = "PERFECT"; box.classList.add('bg-perfect'); }
        else { triggerFeedback('success'); label.innerText = "ACCEPTABLE"; box.classList.add('bg-acceptable'); }
    }

    function copyToClipboard() {
        const text = `Code: ${inputField.value.toUpperCase()}\nAge: ${document.getElementById('daysValue').innerText}\nHarvest: ${document.getElementById('dateText').innerText}`;
        navigator.clipboard.writeText(text).then(() => {
            const old = copyBtn.innerText;
            copyBtn.innerText = "COPIED!";
            setTimeout(() => { copyBtn.innerText = old; }, 2000);
        });
    }

    function triggerFeedback(type) {
        card.classList.remove('shake');
        void card.offsetWidth;
        if (type === 'error') card.classList.add('shake');
        if ("vibrate" in navigator) navigator.vibrate(type === 'error' ? [150, 50, 150] : 40);
    }
</script>
</body>
</html>
