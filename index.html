<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp Pro</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="edited-image.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --pulp-lime: #a6e22e; 
            --pulp-amber: #ff8c00;
            --pulp-red: #ff4d4d;
            --bg-black: #000000;
            --glass-card: rgba(22, 22, 24, 0.98);
        }

        body { 
            background-color: var(--bg-black);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;
            color: #fff; overflow: hidden;
        }

        /* SPLASH SCREEN */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-black); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease-in-out, visibility 1s;
        }
        .splash-logo { width: 70vw; max-width: 350px; animation: heroFade 2.6s ease-in-out forwards; }
        .splash-text { margin-top: 20px; font-size: 2.5rem; font-weight: 900; letter-spacing: 6px; color: var(--pulp-lime); text-transform: uppercase; text-shadow: 0 0 15px rgba(166, 226, 46, 0.5); opacity: 0; animation: textFade 2.6s ease-in-out forwards; }

        @keyframes heroFade {
            0% { transform: scale(0.8); opacity: 0; filter: blur(15px); }
            35% { transform: scale(1); opacity: 1; filter: blur(0px); }
            75% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.05); opacity: 0; filter: blur(10px); }
        }
        @keyframes textFade {
            0% { transform: translateY(10px); opacity: 0; }
            35% { transform: translateY(0); opacity: 1; }
            75% { opacity: 1; }
            100% { opacity: 0; }
        }
        .loaded #splash-screen { opacity: 0; visibility: hidden; }

        /* MAIN CARD */
        .app-card {
            background: var(--glass-card);
            padding: 2.5rem 1.5rem; border-radius: 50px;
            width: 92%; max-width: 380px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 40px 100px rgba(0,0,0,1);
            backdrop-filter: blur(30px);
            transform: translateY(80px); opacity: 0;
            transition: all 1.2s cubic-bezier(0.15, 1, 0.3, 1) 2.3s;
        }
        .loaded .app-card { transform: translateY(0); opacity: 1; }

        .mini-logo { width: 60px; height: 60px; margin-bottom: 12px; object-fit: contain; }
        .chiquita-text { font-size: 1.6rem; font-weight: 900; color: var(--pulp-lime); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .checker-title { font-weight: 900; letter-spacing: 4px; color: #fff; opacity: 0.6; text-transform: uppercase; font-size: 0.75rem; margin-bottom: 30px; }

        /* INPUTS */
        .input-wrapper { background: rgba(255,255,255,0.03); border: 2px solid rgba(166, 226, 46, 0.2); border-radius: 25px; padding: 20px; margin-bottom: 25px; }
        input { border: none !important; text-align: center; letter-spacing: 12px; font-weight: 900; font-size: 3.5rem !important; background: transparent !important; color: #fff; width: 100%; outline: none; text-transform: uppercase; }

        .btn-main { background: linear-gradient(135deg, var(--pulp-amber), #ff4500); color: #fff; border-radius: 100px; padding: 18px; font-weight: 900; width: 100%; border: none; text-transform: uppercase; box-shadow: 0 10px 30px rgba(255, 140, 0, 0.3); }

        /* RESULT BOX */
        .result-display { margin-top: 30px; padding: 25px; border-radius: 40px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.08); position: relative; }
        .bg-perfect { border-color: var(--pulp-lime); color: var(--pulp-lime); }
        .bg-acceptable { border-color: var(--pulp-amber); color: var(--pulp-amber); }
        .bg-old { border-color: var(--pulp-red); color: var(--pulp-red); }

        #daysValue { font-size: 6rem; font-weight: 900; line-height: 1; }
        .label-sub { font-size: 0.75rem; opacity: 0.4; font-weight: 800; text-transform: uppercase; }

        /* COPY BUTTON */
        .btn-copy {
            margin-top: 15px; background: rgba(255,255,255,0.1); border: none; 
            color: #fff; border-radius: 12px; padding: 8px 15px; font-size: 0.7rem; 
            font-weight: 800; text-transform: uppercase; transition: 0.3s;
            display: none; width: fit-content; margin-left: auto; margin-right: auto;
        }
        .btn-copy:active { background: var(--pulp-lime); color: #000; }

        .shake { animation: shake 0.4s both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="edited-image.png" class="splash-logo" alt="Pulp Pro">
        <div class="splash-text">PULP PRO</div>
    </div>

<div class="app-card" id="appCard">
    <img src="edited-image.png" class="mini-logo" alt="Pulp Pro">
    <div class="chiquita-text">Chiquita Banana</div>
    <div class="checker-title">Age Checker</div>
    
    <div class="input-wrapper">
        <input type="text" id="codeIn" placeholder="---" maxlength="3" inputmode="text" autocapitalize="characters" autofocus>
    </div>
    
    <button onclick="checkBanana()" class="btn-main">Calculate</button>

    <div id="resBox" class="result-display">
        <div id="statusLabel" style="font-weight:900;">READY</div>
        <div id="daysValue">--</div>
        <div class="label-sub">Days from Harvest</div>
        <div id="dateText" style="font-size: 1.5rem; font-weight: 900; margin-top: 15px;">-- -- ----</div>
        
        <button id="copyBtn" class="btn-copy" onclick="copyDetails()">Copy Details</button>
    </div>
</div>

<script>
    window.addEventListener('load', () => {
        setTimeout(() => { document.body.classList.add('loaded'); }, 2500);
    });

    const inputField = document.getElementById('codeIn');
    inputField.addEventListener('input', () => { if (inputField.value.length === 3) checkBanana(); });

    function checkBanana() {
        const val = inputField.value.toUpperCase();
        if (val.length < 3) return;
        const box = document.getElementById('resBox');
        const label = document.getElementById('statusLabel');
        const daysVal = document.getElementById('daysValue');
        const dateTxt = document.getElementById('dateText');
        const copyBtn = document.getElementById('copyBtn');

        const mChar = val.charCodeAt(0);
        const dChar = val.charCodeAt(1);
        const yDigit = val.charAt(2);
        const isValid = (mChar >= 65 && mChar <= 76) && (dChar >= 65 && dChar <= 90) && (yDigit === '1' || yDigit === '2');

        if (!isValid) {
            document.getElementById('appCard').classList.add('shake');
            setTimeout(()=>document.getElementById('appCard').classList.remove('shake'), 400);
            box.className = 'result-display';
            label.innerText = "INVALID";
            daysVal.innerText = "ERR";
            copyBtn.style.display = "none";
            return;
        }

        const now = new Date();
        const m = mChar - 65;
        let d = dChar - 64;
        if (yDigit === '2') d += 26;
        let hDate = new Date(now.getFullYear(), m, d);
        if (hDate > now) hDate.setFullYear(now.getFullYear() - 1);
        const diff = Math.floor((now - hDate) / (1000*60*60*24));

        daysVal.innerText = diff;
        dateTxt.innerText = hDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();
        box.className = 'result-display'; 
        copyBtn.style.display = "block";

        if (diff > 31) { label.innerText = "TOO OLD"; box.classList.add('bg-old'); }
        else if (diff <= 21) { label.innerText = "PERFECT"; box.classList.add('bg-perfect'); }
        else { label.innerText = "ACCEPTABLE"; box.classList.add('bg-acceptable'); }
    }

    function copyDetails() {
        const code = inputField.value.toUpperCase();
        const days = document.getElementById('daysValue').innerText;
        const date = document.getElementById('dateText').innerText;
        const status = document.getElementById('statusLabel').innerText;
        
        const text = `Pulp Pro Report\nCode: ${code}\nStatus: ${status}\nDays: ${days}\nHarvest: ${date}`;
        
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.innerText = "COPIED!";
            setTimeout(() => { btn.innerText = "COPY DETAILS"; }, 2000);
        });
    }
</script>
</body>
</html>
