<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp Pro | Hub</title>
    
    <style>
        :root {
            --pulp-lime: #a6e22e; 
            --pulp-amber: #ff8c00;
            --bg-black: #000000;
            --glass-card: rgba(30, 30, 32, 0.85);
        }

        body { 
            background-color: var(--bg-black);
            background-image: radial-gradient(circle at top right, #1a1a1a, #000);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0; color: #fff; display: flex; justify-content: center; padding: 20px;
        }

        /* HEADER */
        .header-main {
            width: 100%; max-width: 900px; display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 40px;
        }
        .logo-group { display: flex; align-items: center; gap: 12px; }
        .logo-group img { height: 35px; border-radius: 8px; }
        .logo-group span { font-weight: 900; font-size: 1.4rem; letter-spacing: 1px; }
        .hub-label { font-weight: 300; opacity: 0.5; border-left: 1px solid #444; padding-left: 15px; margin-left: 5px; }

        /* HUB VIEW */
        .nav-view { width: 100%; max-width: 900px; }
        .section-title { font-weight: 800; font-size: 1.8rem; margin-bottom: 30px; letter-spacing: -0.5px; }

        /* COMMODITY CARDS */
        .selection-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
        }
        
        .selection-card {
            position: relative; height: 380px; border-radius: 28px; overflow: hidden;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1); 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            background: #111;
        }
        .selection-card:hover { transform: translateY(-8px); border-color: var(--pulp-lime); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        
        .card-img { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: 1; transition: transform 0.6s ease;
        }
        .selection-card:hover .card-img { transform: scale(1.05); }

        .card-overlay { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 60%);
            z-index: 2; display: flex; flex-direction: column; justify-content: flex-end; padding: 30px;
        }

        .card-tag { 
            font-size: 0.75rem; font-weight: 900; color: var(--pulp-amber); 
            letter-spacing: 2px; text-transform: uppercase; background: rgba(0,0,0,0.5);
            padding: 5px 12px; border-radius: 10px; width: fit-content;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="nav-view">
        <div class="header-main">
            <div class="logo-group">
                <img src="https://github.com/placeholder-logo.png?raw=true" id="mainLogo" alt="Pulp Pro">
                <span>Pulp Pro <span class="hub-label">Hub</span></span>
            </div>
            <div style="cursor:pointer; font-size:1.5rem; opacity:0.7;">☰</div>
        </div>

        <div id="fruit-hub">
            <div class="section-title">Select Commodity</div>
            <div class="selection-grid">
                
                <div class="selection-card" onclick="alert('Opening Banana Brands...')">
                    <img src="" id="img-banana" class="card-img" alt="Banana">
                    <div class="card-overlay"></div>
                </div>

                <div class="selection-card">
                    <img src="" id="img-mango" class="card-img" alt="Mango">
                    <div class="card-overlay">
                        <span class="card-tag">Soon</span>
                    </div>
                </div>

                <div class="selection-card">
                    <img src="" id="img-avocado" class="card-img" alt="Avocado">
                    <div class="card-overlay">
                        <span class="card-tag">Soon</span>
                    </div>
                </div>

            </div>
        </div>
    </div>

<script>
    /** * CONFIGURATION: Replace these with your actual GitHub info
     */
    const GITHUB_USER = "YOUR_USERNAME"; // e.g., "johndoe"
    const GITHUB_REPO = "YOUR_REPO_NAME"; // e.g., "pulp-pro-assets"
    const BRANCH = "main"; // usually "main" or "master"

    // Helper to build the correct Raw URL
    const getRawUrl = (fileName) => `https://github.com/${GITHUB_USER}/${GITHUB_REPO}/blob/${BRANCH}/${fileName}?raw=true`;

    // Apply images once the page loads
    window.onload = () => {
        document.getElementById('img-banana').src = getRawUrl('banana.png');
        document.getElementById('img-mango').src = getRawUrl('mango.png');
        document.getElementById('img-avocado').src = getRawUrl('avocado.png');
        
        // Update logo as well if you have it in the repo
        document.getElementById('mainLogo').src = getRawUrl('edited-image.png');
    };
</script>
</body>
</html>
