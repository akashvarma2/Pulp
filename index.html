<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp Pro AI</title>
    
    <!-- TensorFlow.js for Machine Learning -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="edited-image.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --pulp-lime: #a6e22e; 
            --pulp-amber: #ff8c00;
            --bg-black: #000000;
            --glass-card: rgba(22, 22, 24, 0.98);
            --text-main: #ffffff;
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        body { 
            background-color: var(--bg-black);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-main); margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* UI Elements */
        .nav-view { width: 100%; max-width: 500px; text-align: center; margin-top: 20px; }
        .hidden { display: none !important; }
        
        .card-ai {
            background: var(--glass-card); border: 1px solid var(--border-glass);
            border-radius: 40px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Camera & Scanning */
        .camera-container {
            width: 100%; aspect-ratio: 1/1; background: #111;
            border-radius: 30px; overflow: hidden; position: relative;
            border: 2px solid var(--pulp-lime); margin-bottom: 20px;
        }
        #video-feed { width: 100%; height: 100%; object-fit: cover; }
        
        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--pulp-lime); box-shadow: 0 0 15px var(--pulp-lime);
            display: none; animation: scanMove 2s linear infinite;
        }
        @keyframes scanMove { 0% { top: 0; } 100% { top: 100%; } }

        .analysis-overlay {
            position: absolute; bottom: 10px; left: 10px; right: 10px;
            background: rgba(0,0,0,0.7); padding: 10px; border-radius: 15px;
            font-size: 0.8rem; font-weight: bold; color: var(--pulp-lime);
            text-align: left; border: 1px solid var(--pulp-lime);
        }

        .btn-pulp {
            background: var(--pulp-lime); color: black; border: none;
            border-radius: 50px; padding: 15px 30px; font-weight: 900;
            text-transform: uppercase; width: 100%; margin-bottom: 10px;
        }
        
        .loading-text { font-size: 0.7rem; letter-spacing: 2px; color: var(--pulp-lime); margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- Main Hub -->
    <div id="fruit-hub" class="nav-view">
        <h2 style="font-weight: 900; color: var(--pulp-lime); margin-bottom: 30px;">PULP PRO AI</h2>
        <div class="card-ai" onclick="startDefectMode()">
            <i class="bi bi-camera" style="font-size: 4rem; color: var(--pulp-lime);"></i>
            <h3 style="margin-top: 15px;">DETECT DEFECTS</h3>
            <p style="opacity: 0.6; font-size: 0.9rem;">Internal & External AI Analysis</p>
        </div>
    </div>

    <!-- AI Interface -->
    <div id="ai-view" class="nav-view hidden">
        <div class="card-ai">
            <div id="model-status" class="loading-text">INITIALIZING AI ENGINE...</div>
            <div class="camera-container">
                <video id="video-feed" autoplay playsinline></video>
                <div id="scan-line" class="scan-line"></div>
                <div id="ai-data" class="analysis-overlay hidden">
                    <div id="id-text">ID: SCANNING...</div>
                    <div id="defect-text">SURFACE: ANALYZING...</div>
                </div>
            </div>
            
            <button id="analyze-btn" class="btn-pulp" onclick="runFullAnalysis()" disabled>Analyze Fruit</button>
            <button class="btn-pulp" style="background: transparent; color: white; border: 1px solid gray;" onclick="exitAI()">Back</button>
        </div>
    </div>

<script>
    let net;
    let stream;
    const video = document.getElementById('video-feed');
    const scanLine = document.getElementById('scan-line');
    const aiData = document.getElementById('ai-data');
    const statusText = document.getElementById('model-status');
    const analyzeBtn = document.getElementById('analyze-btn');

    // Load AI Model
    async function initAI() {
        try {
            net = await cocoSsd.load();
            statusText.innerText = "AI ENGINE READY";
            analyzeBtn.disabled = false;
        } catch (e) {
            statusText.innerText = "OFFLINE MODE";
            console.error(e);
        }
    }
    initAI();

    async function startDefectMode() {
        document.getElementById('fruit-hub').classList.add('hidden');
        document.getElementById('ai-view').classList.remove('hidden');
        
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", focusMode: "continuous" } 
            });
            video.srcObject = stream;
        } catch (err) {
            alert("Camera Access Required: " + err);
        }
    }

    function exitAI() {
        if (stream) stream.getTracks().forEach(t => t.stop());
        document.getElementById('ai-view').classList.add('hidden');
        document.getElementById('fruit-hub').classList.remove('hidden');
        aiData.classList.add('hidden');
    }

    async function runFullAnalysis() {
        scanLine.style.display = 'block';
        aiData.classList.remove('hidden');
        document.getElementById('id-text').innerText = "ID: PROCESSING...";
        document.getElementById('defect-text').innerText = "SURFACE: SCANNING MICRONS...";

        // 1. Identify Fruit via TensorFlow
        const predictions = await net.detect(video);
        
        setTimeout(() => {
            scanLine.style.display = 'none';
            
            if (predictions.length > 0) {
                const item = predictions[0].class.toUpperCase();
                const conf = Math.round(predictions[0].score * 100);
                
                // 2. High-Sensitivity Defect Logic (Simulated)
                // In production, this uses a second Custom Vision model for textures
                const scarDetected = Math.random() > 0.8; 
                const internalIssue = Math.random() > 0.9;

                document.getElementById('id-text').innerText = `ID: ${item} (${conf}%)`;
                
                let defectInfo = scarDetected ? 
                    "⚠️ MICRO-SCAR DETECTED (0.15mm)" : 
                    "✅ EXTERNAL SURFACE: PRISTINE";
                
                defectInfo += internalIssue ? 
                    " | ❌ INTERNAL: CORE SOFTENING" : 
                    " | ✅ INTERNAL: SOUND";

                document.getElementById('defect-text').innerText = defectInfo;
                
                // Identification feedback if no fruit matches standard classes
                if (item === "PERSON" || item === "CELL PHONE") {
                    alert("Object detected is not a fruit. Please point at a commodity.");
                }
            } else {
                document.getElementById('id-text').innerText = "ID: UNKNOWN OBJECT";
                document.getElementById('defect-text').innerText = "Please ensure direct lighting and 15cm distance.";
            }
        }, 2000);
    }
</script>
</body>
</html>
